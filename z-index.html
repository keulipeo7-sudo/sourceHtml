<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index 실습</title>
    <style>
        div{
            position: relative;
        }
        img{
            position: absolute;
            width: 100px;
            height: 140px;
        }
        #spadeA{
            left: 10px;
            top: 20px;
            z-index: 7;
        }
        #spade2{
            left: 40px;
            top: 30px;
            z-index: 3;
        }
        #spade3{
            left: 70px;
            top: 40px;
            z-index: 2;
        }
        #spade7{
            left: 100px;
            top: 50px;
            z-index: -3;
        }
    </style>
</head>
<body>
    <h3>z-index 프로미어</h3>
    <hr>
    <div>
        <img src="image/spade-A.png" alt="" id="spadeA">
        <img src="image/spade-2.png" alt="" id="spade2">
        <img src="image/spade-3.png" alt="" id="spade3">
        <img src="image/spade-7.png" alt="" id="spade7">
    </div>
</body>
</html>
